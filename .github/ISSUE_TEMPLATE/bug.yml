name: Bug Report
description: File a bug report to help us improve Monad Validator Manager
title: '[BUG] '
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - CLI
        - TUI
        - Staking Operations
        - Doctor Diagnostics
        - Configuration
        - Installation
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run 'monad-val-manager init'
        2. Configure network to testnet
        3. Run 'monad-val-manager stake delegate ...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened
      placeholder: |
        Error: Connection refused
        Panicked with message: ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Environment details
      placeholder: |
        - OS: [e.g. Ubuntu 22.04, macOS 14, Windows 11]
        - Terminal: [e.g. GNOME Terminal, iTerm2, Windows Terminal]
        - Version: [run `monad-val-manager --version`]
        - Network: [mainnet/testnet]
        - Node: [Monad node version if relevant]
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs/Screenshots
      description: Paste relevant logs or screenshots
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing issues for similar bugs
          required: true
        - label: I have provided all requested information
          required: true
